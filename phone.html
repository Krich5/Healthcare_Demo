<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SMS Simulator — Greenfield Medical</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #1c1c1e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, 'SF Pro Display', sans-serif;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 30% 20%, rgba(0,122,255,.09) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 75% 80%, rgba(52,199,89,.06) 0%, transparent 65%);
  pointer-events: none;
}

/* ── PHONE SHELL ── */
.phone {
  width: 393px;
  height: 852px;
  background: #000;
  border-radius: 55px;
  padding: 12px;
  position: relative;
  box-shadow:
    0 0 0 1.5px #3a3a3c,
    0 0 0 3px #111,
    0 0 0 4.5px #3a3a3c,
    0 50px 100px rgba(0,0,0,.8),
    0 20px 40px rgba(0,0,0,.5);
  flex-shrink: 0;
}

/* side buttons */
.phone::before {
  content: '';
  position: absolute;
  left: -3.5px; top: 130px;
  width: 3.5px; height: 36px;
  background: #3a3a3c;
  border-radius: 3px 0 0 3px;
  box-shadow: 0 52px 0 #3a3a3c, 0 94px 0 #3a3a3c;
}
.phone::after {
  content: '';
  position: absolute;
  right: -3.5px; top: 160px;
  width: 3.5px; height: 72px;
  background: #3a3a3c;
  border-radius: 0 3px 3px 0;
}

.screen {
  background: #f2f2f7;
  border-radius: 46px;
  overflow: hidden;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── DYNAMIC ISLAND ── */
.dynamic-island {
  position: absolute;
  top: 13px; left: 50%;
  transform: translateX(-50%);
  width: 126px; height: 37px;
  background: #000;
  border-radius: 20px;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
}
.di-cam {
  width: 11px; height: 11px;
  background: #111;
  border-radius: 50%;
  border: 1.5px solid #222;
  position: relative;
}
.di-cam::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 4px; height: 4px;
  background: #1a3a6a;
  border-radius: 50%;
}
.di-dot {
  width: 5px; height: 5px;
  background: #111;
  border-radius: 50%;
}

/* ── STATUS BAR ── */
.status-bar {
  height: 59px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 30px 10px;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
}
.status-time {
  font-size: 16px;
  font-weight: 700;
  color: #000;
  letter-spacing: -.4px;
}
.status-icons {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── NAV HEADER ── */
.nav-header {
  background: rgba(242,242,247,.94);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: .5px solid rgba(0,0,0,.12);
  padding: 6px 16px 10px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 4;
  gap: 10px;
}
.nav-back {
  display: flex;
  align-items: center;
  gap: 3px;
  color: #007aff;
  font-size: 16px;
  min-width: 44px;
}
.nav-back svg { width: 10px; height: 16px; }
.nav-back-count { font-size: 16px; font-weight: 400; }
.nav-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.nav-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(145deg, #30d158, #25a244);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 2px;
  box-shadow: 0 2px 8px rgba(48,209,88,.35);
}
.nav-name {
  font-size: 13px;
  font-weight: 600;
  color: #000;
  line-height: 1;
}
.nav-sub {
  font-size: 11px;
  color: #8e8e93;
  margin-top: 1px;
}
.nav-actions {
  display: flex;
  gap: 8px;
  min-width: 44px;
  justify-content: flex-end;
}
.nav-btn {
  width: 32px; height: 32px;
  background: rgba(0,0,0,.06);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* ── MESSAGE THREAD ── */
.thread {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px 6px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  scroll-behavior: smooth;
}
.thread::-webkit-scrollbar { display: none; }

.date-sep {
  text-align: center;
  font-size: 11.5px;
  color: #8e8e93;
  font-weight: 500;
  margin: 10px 0 5px;
  letter-spacing: .1px;
}

/* bubble group = consecutive same-direction messages */
.bgroup {
  display: flex;
  flex-direction: column;
  margin-bottom: 3px;
  animation: pop .28s cubic-bezier(.34,1.4,.64,1);
}
@keyframes pop {
  from { opacity: 0; transform: translateY(12px) scale(.93); }
  to   { opacity: 1; transform: none; }
}
.bgroup.out { align-items: flex-end; }
.bgroup.in  { align-items: flex-start; }

.bubble {
  max-width: 75%;
  padding: 10px 14px;
  font-size: 16px;
  line-height: 1.38;
  word-break: break-word;
  position: relative;
}

/* outbound — iMessage blue */
.bgroup.out .bubble {
  background: #007aff;
  color: #fff;
  border-radius: 20px 20px 5px 20px;
}
.bgroup.out .bubble:not(:last-child) {
  border-radius: 20px;
  margin-bottom: 2px;
}
.bgroup.out .bubble:last-child::after {
  content: '';
  position: absolute;
  bottom: 0; right: -7px;
  width: 14px; height: 14px;
  background: #007aff;
  clip-path: polygon(0 0, 0 100%, 100% 100%);
  border-radius: 0 0 4px 0;
}

/* inbound — gray */
.bgroup.in .bubble {
  background: #e5e5ea;
  color: #000;
  border-radius: 20px 20px 20px 5px;
}
.bgroup.in .bubble:not(:last-child) {
  border-radius: 20px;
  margin-bottom: 2px;
}
.bgroup.in .bubble:last-child::after {
  content: '';
  position: absolute;
  bottom: 0; left: -7px;
  width: 14px; height: 14px;
  background: #e5e5ea;
  clip-path: polygon(0 100%, 100% 0, 100% 100%);
  border-radius: 0 0 0 4px;
}

.bubble-foot {
  font-size: 10.5px;
  color: #8e8e93;
  margin-top: 3px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.bgroup.out .bubble-foot { justify-content: flex-end; }
.tick { color: #007aff; }

/* ── TYPING INDICATOR ── */
.typing-row {
  display: none;
  align-items: flex-end;
  padding: 2px 0 4px;
  animation: pop .28s ease;
}
.typing-row.show { display: flex; }
.typing-bubble {
  background: #e5e5ea;
  border-radius: 20px 20px 20px 5px;
  padding: 11px 14px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.tdot {
  width: 7px; height: 7px;
  background: #8e8e93;
  border-radius: 50%;
  animation: bounce 1.3s ease infinite;
}
.tdot:nth-child(2) { animation-delay: .15s; }
.tdot:nth-child(3) { animation-delay: .30s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30%          { transform: translateY(-6px); }
}

/* ── INPUT BAR ── */
.input-bar {
  background: rgba(242,242,247,.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: .5px solid rgba(0,0,0,.12);
  padding: 8px 12px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.ib-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,.07);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.ib-field {
  flex: 1;
  background: #fff;
  border: 1px solid rgba(0,0,0,.13);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 16px;
  color: #c7c7cc;
  min-height: 36px;
  display: flex;
  align-items: center;
}
.ib-send {
  width: 32px; height: 32px;
  background: #007aff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}

/* ── HOME BAR ── */
.home-bar-wrap {
  height: 30px;
  background: #f2f2f7;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.home-bar {
  width: 134px; height: 5px;
  background: rgba(0,0,0,.18);
  border-radius: 3px;
}

/* ── EMPTY STATE ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #8e8e93;
  gap: 10px;
  padding: 20px;
  text-align: center;
}
.empty-state .es-icon { font-size: 42px; }
.empty-state .es-title { font-size: 16px; font-weight: 600; color: #3c3c43; }
.empty-state .es-sub { font-size: 13.5px; line-height: 1.5; }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <!-- Dynamic Island -->
    <div class="dynamic-island">
      <div class="di-cam"></div>
      <div class="di-dot"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-time" id="clock">9:41</div>
      <div class="status-icons">
        <!-- Signal bars -->
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#000">
          <rect x="0" y="4" width="3" height="8" rx="1"/>
          <rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/>
          <rect x="9" y="1" width="3" height="11" rx="1"/>
          <rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".3"/>
        </svg>
        <!-- WiFi -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#000">
          <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.5a6 6 0 0 1 4.24 1.76l-1.42 1.41A4 4 0 0 0 8 8a4 4 0 0 0-2.82 1.17L3.76 7.76A6 6 0 0 1 8 6zm0-3.5a9.5 9.5 0 0 1 6.72 2.78l-1.42 1.41A7.5 7.5 0 0 0 8 5a7.5 7.5 0 0 0-5.3 2.19L1.28 5.78A9.5 9.5 0 0 1 8 2.5z"/>
        </svg>
        <!-- Battery -->
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x=".5" y="1.5" width="21" height="9" rx="2.5" stroke="#000" stroke-width="1"/>
          <path d="M23 4.5v3a1.5 1.5 0 0 0 0-3z" fill="#000"/>
          <rect x="2" y="3" width="16" height="6" rx="1.5" fill="#000"/>
        </svg>
      </div>
    </div>

    <!-- Nav Header -->
    <div class="nav-header">
      <div class="nav-back">
        <svg viewBox="0 0 10 17" fill="none">
          <path d="M9 1L1 8.5L9 16" stroke="#007AFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-back-count" id="msg-count">1</span>
      </div>
      <div class="nav-center">
        <div class="nav-avatar" id="nav-avatar">GH</div>
        <div class="nav-name" id="nav-name">Greenfield Medical</div>
        <div class="nav-sub" id="nav-sub">Hospital &amp; Medical Center</div>
      </div>
      <div class="nav-actions">
        <div class="nav-btn">📞</div>
      </div>
    </div>

    <!-- Thread -->
    <div class="thread" id="thread">
      <div class="empty-state" id="empty-state">
        <div class="es-icon">💬</div>
        <div class="es-title">No messages yet</div>
        <div class="es-sub">Messages sent from<br>Webex Connect will<br>appear here.</div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-row" id="typing-row">
      <div class="typing-bubble">
        <div class="tdot"></div>
        <div class="tdot"></div>
        <div class="tdot"></div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="ib-icon">➕</div>
      <div class="ib-field">iMessage</div>
      <div class="ib-send">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 12V2M7 2L3 6M7 2l4 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Home bar -->
    <div class="home-bar-wrap"><div class="home-bar"></div></div>

  </div>
</div>

<script>
const SMS_API = 'https://689f84f46e38a02c58168326.mockapi.io/SMSMessages';
const POLL_MS = 3000;

let rendered  = new Set();
let allMsgs   = [];

// Clock
function tickClock() {
  const n = new Date();
  let h = n.getHours() % 12 || 12;
  const m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  setTimeout(tickClock, 15000);
}
tickClock();

// Time formatter
function fmtTime(ts) {
  if(!ts) return '';
  const d = new Date(ts);
  if(isNaN(d)) return '';
  let h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2,'0');
  const ap = d.getHours() >= 12 ? 'PM' : 'AM';
  return `${h}:${m} ${ap}`;
}

function fmtDateSep(ts) {
  if(!ts) return '';
  const d = new Date(ts);
  if(isNaN(d)) return '';
  const now = new Date();
  if(d.toDateString() === now.toDateString()) return 'Today';
  const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
  if(d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Update contact header from latest message
function updateHeader(msgs) {
  if(!msgs.length) return;
  const m = msgs[msgs.length-1];
  const name = m.patientName || 'Unknown';
  const initials = name.split(' ').map(n=>n[0]||'').join('').substring(0,2).toUpperCase();
  document.getElementById('nav-name').textContent = name;
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-sub').textContent = m.phone || 'SMS';
  document.getElementById('msg-count').textContent = msgs.length;
}

// Render all messages grouped by direction runs
function renderAll(msgs) {
  const thread = document.getElementById('thread');
  const empty  = document.getElementById('empty-state');

  if(!msgs.length) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  let html = '';
  let lastDateStr = '';
  let i = 0;

  while(i < msgs.length) {
    const m = msgs[i];
    const dir = (m.direction || 'outbound') === 'inbound' ? 'in' : 'out';
    const dateStr = fmtDateSep(m.timestamp);

    if(dateStr && dateStr !== lastDateStr) {
      html += `<div class="date-sep">${dateStr}</div>`;
      lastDateStr = dateStr;
    }

    // Collect consecutive same-direction messages as a group
    let j = i;
    let groupBubbles = '';
    while(j < msgs.length) {
      const gm = msgs[j];
      const gdir = (gm.direction || 'outbound') === 'inbound' ? 'in' : 'out';
      if(gdir !== dir) break;
      // date boundary also breaks group
      const gDate = fmtDateSep(gm.timestamp);
      if(gDate !== lastDateStr && gDate) break;
      const isLast = (j === msgs.length-1) ||
        ((msgs[j+1]?.direction||'outbound') === 'inbound' ? 'in' : 'out') !== dir;
      groupBubbles += `<div class="bubble">${escHtml(gm.message||'')}</div>`;
      j++;
    }

    const lastInGroup = msgs[j-1];
    const status = lastInGroup?.status || 'Delivered';
    const delivered = dir === 'out'
      ? `<span class="tick">✓</span> ${status.charAt(0).toUpperCase()+status.slice(1)}`
      : '';

    html += `<div class="bgroup ${dir}" data-ids="${msgs.slice(i,j).map(x=>x.id).join(',')}">
      ${groupBubbles}
      <div class="bubble-foot">${fmtTime(lastInGroup?.timestamp)} ${delivered}</div>
    </div>`;

    i = j;
  }

  thread.innerHTML = html;
  thread.scrollTop = thread.scrollHeight;
  updateHeader(msgs);
}

// Append only new messages with typing animation
function appendNew(newMsgs) {
  const tr = document.getElementById('typing-row');
  tr.classList.add('show');
  setTimeout(() => {
    tr.classList.remove('show');
    renderAll(allMsgs);
  }, 900 + Math.random() * 400);
}

// Poll
async function poll() {
  try {
    const res = await fetch(SMS_API + '?t=' + Date.now());
    const raw = await res.json();
    const msgs = (Array.isArray(raw) ? raw : Object.values(raw))
      .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

    const incoming = msgs.filter(m => !rendered.has(String(m.id)));
    if(incoming.length) {
      incoming.forEach(m => rendered.add(String(m.id)));
      const hadMessages = allMsgs.length > 0;
      allMsgs = msgs;
      if(hadMessages) {
        appendNew(incoming);
      } else {
        renderAll(allMsgs);
      }
    }
  } catch(e) { /* silent */ }
  setTimeout(poll, POLL_MS);
}

poll();
</script>
</body>
</html>
