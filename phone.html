<script>
const SMS_API = 'https://689f84f46e38a02c58168326.mockapi.io/SMSMessages';
const POLL_MS = 3000;

// Pick the conversation you want this "mock phone" to show
const ACTIVE_SESSION_ID = 'DEMO-001';
const ACTIVE_PHONE = '3855950504';
// Optional: keep this blank if you do not want to filter by patient
const ACTIVE_PATIENT_ID = '3';

let allMsgs = [];
let knownIds = new Set();
let pollingStarted = false;

// Clock
function tickClock() {
  const n = new Date();
  let h = n.getHours() % 12 || 12;
  const m = String(n.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  setTimeout(tickClock, 15000);
}
tickClock();

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return '';
  let h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2, '0');
  const ap = d.getHours() >= 12 ? 'PM' : 'AM';
  return `${h}:${m} ${ap}`;
}

function fmtDateSep(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return '';

  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Today';

  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';

  return d.toLocaleDateString('en-US', {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function normalizeMessage(m) {
  return {
    ...m,
    id: String(m.id || ''),
    sessionId: String(m.sessionId || ''),
    patientId: m.patientId == null ? '' : String(m.patientId),
    patientName: m.patientName || '',
    phone: String(m.phone || ''),
    message: m.message || '',
    direction: (m.direction || 'outbound').toLowerCase() === 'inbound' ? 'inbound' : 'outbound',
    status: m.status || '',
    channel: m.channel || '',
    timestamp: m.timestamp || m.createdAt || new Date().toISOString()
  };
}

function isActiveConversation(m) {
  if (ACTIVE_SESSION_ID && m.sessionId !== ACTIVE_SESSION_ID) return false;
  if (ACTIVE_PHONE && m.phone !== ACTIVE_PHONE) return false;
  if (ACTIVE_PATIENT_ID && m.patientId !== ACTIVE_PATIENT_ID) return false;
  return true;
}

function getDisplayName(msgs) {
  const withPatientName = [...msgs].reverse().find(m => m.patientName && m.patientName.trim());
  if (withPatientName) return withPatientName.patientName.trim();

  const withPhone = [...msgs].reverse().find(m => m.phone && m.phone.trim());
  if (withPhone) return withPhone.phone.trim();

  return 'Unknown';
}

function updateHeader(msgs) {
  const name = getDisplayName(msgs);
  const latest = msgs[msgs.length - 1] || {};
  const initials = name
    .split(' ')
    .map(part => part[0] || '')
    .join('')
    .substring(0, 2)
    .toUpperCase() || '??';

  document.getElementById('nav-name').textContent = name;
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-sub').textContent = latest.phone || 'SMS';
  document.getElementById('msg-count').textContent = String(msgs.length);
}

function renderAll(msgs) {
  const thread = document.getElementById('thread');
  const empty = document.getElementById('empty-state');

  if (!msgs.length) {
    thread.innerHTML = '';
    empty.style.display = 'flex';
    thread.appendChild(empty);
    document.getElementById('nav-name').textContent = 'No conversation';
    document.getElementById('nav-avatar').textContent = '—';
    document.getElementById('nav-sub').textContent = 'Waiting for SMS';
    document.getElementById('msg-count').textContent = '0';
    return;
  }

  empty.style.display = 'none';

  let html = '';
  let lastDateStr = '';
  let i = 0;

  while (i < msgs.length) {
    const m = msgs[i];
    const dir = m.direction === 'inbound' ? 'in' : 'out';
    const dateStr = fmtDateSep(m.timestamp);

    if (dateStr && dateStr !== lastDateStr) {
      html += `<div class="date-sep">${dateStr}</div>`;
      lastDateStr = dateStr;
    }

    let j = i;
    let groupBubbles = '';

    while (j < msgs.length) {
      const gm = msgs[j];
      const gdir = gm.direction === 'inbound' ? 'in' : 'out';
      const gDate = fmtDateSep(gm.timestamp);

      if (gdir !== dir) break;
      if (gDate !== lastDateStr && gDate) break;

      groupBubbles += `<div class="bubble">${escHtml(gm.message)}</div>`;
      j++;
    }

    const lastInGroup = msgs[j - 1];
    const status = lastInGroup?.status || '';
    const delivered = dir === 'out' && status
      ? `<span class="tick">✓</span> ${escHtml(status.charAt(0).toUpperCase() + status.slice(1))}`
      : '';

    html += `
      <div class="bgroup ${dir}" data-ids="${msgs.slice(i, j).map(x => x.id).join(',')}">
        ${groupBubbles}
        <div class="bubble-foot">
          ${fmtTime(lastInGroup?.timestamp)}
          ${delivered}
        </div>
      </div>
    `;

    i = j;
  }

  thread.innerHTML = html;
  thread.scrollTop = thread.scrollHeight;
  updateHeader(msgs);
}

function showTypingThenRender() {
  const tr = document.getElementById('typing-row');
  tr.classList.add('show');

  setTimeout(() => {
    tr.classList.remove('show');
    renderAll(allMsgs);
  }, 800);
}

function sameMessageList(a, b) {
  if (a.length !== b.length) return false;

  for (let i = 0; i < a.length; i++) {
    const ax = a[i];
    const bx = b[i];

    if (
      ax.id !== bx.id ||
      ax.message !== bx.message ||
      ax.timestamp !== bx.timestamp ||
      ax.status !== bx.status ||
      ax.direction !== bx.direction
    ) {
      return false;
    }
  }

  return true;
}

async function poll() {
  try {
    const res = await fetch(`${SMS_API}?t=${Date.now()}`, {
      method: 'GET',
      cache: 'no-store'
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const raw = await res.json();

    const msgs = (Array.isArray(raw) ? raw : Object.values(raw))
      .map(normalizeMessage)
      .filter(isActiveConversation)
      .sort((a, b) => {
        const at = new Date(a.timestamp).getTime();
        const bt = new Date(b.timestamp).getTime();

        if (at !== bt) return at - bt;

        return Number(a.id) - Number(b.id);
      });

    const previousIds = new Set(knownIds);
    knownIds = new Set(msgs.map(m => m.id));

    const hasNewInbound = msgs.some(
      m => !previousIds.has(m.id) && m.direction === 'inbound'
    );

    const changed = !sameMessageList(allMsgs, msgs);
    allMsgs = msgs;

    if (!pollingStarted) {
      renderAll(allMsgs);
      pollingStarted = true;
    } else if (changed && hasNewInbound) {
      showTypingThenRender();
    } else if (changed) {
      renderAll(allMsgs);
    }
  } catch (e) {
    console.error('Poll failed:', e);
  } finally {
    setTimeout(poll, POLL_MS);
  }
}

poll();
</script>
